name: Deploy modfanart backend to VPS

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: modfanart
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build backend image
        run: |
          docker build \
            -t ghcr.io/modfanart/modfanart-backend:latest \
            ./backend

      - name: Push backend image
        run: |
          docker push ghcr.io/modfanart/modfanart-backend:latest

  deploy:
  needs: build-and-push
  runs-on: ubuntu-latest

  steps:
    - name: Deploy to VPS
      uses: appleboy/ssh-action@v1.0.3

      with:
        host: ${{ secrets.VPS_HOST }}
        username: root
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          set -e

          APP_NAME="modfanart-backend"
          APP_DIR="/opt/dev/apps/modfanart-backend"

          mkdir -p $APP_DIR

          docker pull ghcr.io/modfanart/modfanart-backend:latest

          docker stop $APP_NAME || true
          docker rm $APP_NAME || true

          docker run -d \
            --name $APP_NAME \
            --restart unless-stopped \
            --network mod-network \
            -p 5000:5000 \
            --env-file $APP_DIR/.env \
            ghcr.io/modfanart/modfanart-backend:latest

          # simple health check
          sleep 5
          docker ps | grep $APP_NAME

