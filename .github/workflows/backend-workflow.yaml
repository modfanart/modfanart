name: Deploy modfanart backend to AWS EC2

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: modfanart
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/modfanart/modfanart-backend:latest \
            ./backend

      - name: Push Docker image
        run: |
          docker push ghcr.io/modfanart/modfanart-backend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io \
              -u modfanart --password-stdin

            docker rm -f modfanart-backend || true

            docker pull ghcr.io/modfanart/modfanart-backend:latest

            docker run -d \
              --name modfanart-backend \
              -p 5000:5000 \
              --env-file /home/ubuntu/.env \
              ghcr.io/modfanart/modfanart-backend:latest

            docker image prune -f