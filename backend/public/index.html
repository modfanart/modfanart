<!doctype html>
<html lang="en" class="bg-white">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>API Server</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Custom Theme (matching your config) -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#9747ff',
              secondary: '#f1f5f9',
              muted: '#64748b',
              border: '#e2e8f0',
            },
            borderRadius: {
              lg: '0.75rem',
            },
          },
        },
      };
    </script>
  </head>

  <body class="bg-gray-50 text-gray-900">
    <div class="min-h-screen flex items-center justify-center px-4">
      <div
        class="bg-white border border-border rounded-lg shadow-xl p-8 max-w-md w-full text-center"
      >
        <!-- Title -->
        <h1 class="text-2xl font-semibold mb-2">🚀 Backend API Running</h1>

        <!-- Description -->
        <p class="text-muted mb-6">
          Your server is up and running successfully.
        </p>

        <!-- Status Badge -->
        <div
          class="inline-block px-4 py-1 rounded-full text-sm font-medium bg-green-100 text-green-700"
        >
          Status: OK
        </div>

        <!-- Link -->
        <div class="mt-6">
          <p class="text-sm text-muted mb-1">Check health endpoint</p>
          <a href="/health" class="text-primary font-medium hover:underline">
            /health
          </a>
        </div>

        <!-- Footer -->
        <div class="mt-6 text-xs text-gray-400">Node.js API Server</div>
      </div>
    </div>
  </body>
</html>
